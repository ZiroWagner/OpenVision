services:
  postgres:
    image: postgres:16-alpine
    container_name: openvision-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openvision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openvision}
      POSTGRES_DB: ${POSTGRES_DB:-openvision}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openvision}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: openvision-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: openvision-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-openvision}:${POSTGRES_PASSWORD:-openvision}@postgres:5432/${POSTGRES_DB:-openvision}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      STORAGE_PATH: /app/storage
      DEBUG: ${DEBUG:-false}
    volumes:
      - ../../storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../../
      dockerfile: frontend/Dockerfile
    container_name: openvision-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
